<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>NiftyBees</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0a0a0a;color:#e0e0e0;font-size:14px;padding:8px;max-width:600px;margin:0 auto}
input,select,button{font-family:inherit;font-size:14px;border:1px solid #444;background:#1a1a1a;color:#e0e0e0;padding:8px 10px;border-radius:4px;width:100%}
input:focus{outline:none;border-color:#0ff}
button{cursor:pointer;background:#222;border-color:#0ff;color:#0ff;font-weight:bold;width:auto;padding:8px 18px}
button:active{background:#0ff;color:#000}
.row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.lbl{color:#888;font-size:12px;margin-bottom:2px}
.val{color:#0f0;font-weight:bold;font-size:16px}
.sell-val{color:#f44}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.tbl th{background:#1a1a1a;color:#0ff;padding:6px 4px;text-align:left;border-bottom:1px solid #333;position:sticky;top:0}
.tbl td{padding:5px 4px;border-bottom:1px solid #1a1a1a}
.tbl tr:hover td{background:#1a1a1a}
.btn-del{color:#f44;background:none;border:none;padding:2px 6px;font-size:12px;width:auto}
.btn-edit{color:#ff0;background:none;border:none;padding:2px 6px;font-size:12px;width:auto}
.hidden{display:none!important}
.err{color:#f44;font-size:12px;margin-top:4px}
.ok{color:#0f0;font-size:12px;margin-top:4px}
.targets{border:1px solid #222;padding:8px;margin-bottom:8px;border-radius:4px;background:#111}
.targets .row{margin-bottom:2px}
.form-group{margin-bottom:10px}
.form-group label{display:block;color:#888;font-size:12px;margin-bottom:3px}
.actions{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.separator{border-top:1px solid #222;margin:6px 0}
.refresh-bar{display:flex;justify-content:flex-end;margin-bottom:6px}
.btn-refresh{font-size:11px;padding:4px 10px;color:#ff0;border-color:#ff0}
.badge{display:inline-block;background:#333;color:#aaa;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:6px}
</style>
</head>
<body>

<!-- ========== LOGIN PAGE ========== -->
<div id="pgLogin">
  <div style="margin-top:30vh">
    <input type="text" id="inpUrl" placeholder="Lambda Function URL">
    <div style="margin-top:8px">
      <input type="password" id="inpPass" placeholder="MySQL password">
    </div>
    <div style="margin-top:8px">
      <button onclick="doLogin()">GO</button>
    </div>
    <div id="loginErr" class="err"></div>
  </div>
</div>

<!-- ========== MAIN PAGE ========== -->
<div id="pgMain" class="hidden">
  <div class="refresh-bar">
    <span id="cacheStatus" class="badge">cached</span>
    <button class="btn-refresh" onclick="hardRefresh()">&#8635; Refresh</button>
  </div>

  <!-- Targets -->
  <div class="targets">
    <div class="row"><span class="lbl" style="width:140px">Next buy target</span><span class="val" id="vBT">—</span></div>
    <div class="row"><span class="lbl" style="width:140px">Next buy qty</span><span class="val" id="vBQ">—</span></div>
    <div class="separator"></div>
    <div class="row"><span class="lbl" style="width:140px">Next sell target</span><span class="sell-val" id="vST">—</span></div>
    <div class="row"><span class="lbl" style="width:140px">Next sell qty</span><span class="sell-val" id="vSQ">—</span></div>
  </div>

  <!-- Transactions table -->
  <div style="overflow-x:auto">
    <table class="tbl" id="tblTx">
      <thead>
        <tr><th>#</th><th>Buy Dt</th><th>Sell Dt</th><th>Qty</th><th>Buy ₹</th><th>Sell ₹</th><th></th></tr>
      </thead>
      <tbody id="tbodyTx"></tbody>
    </table>
  </div>

  <div class="actions">
    <button onclick="showAddForm()">+ Add Transaction</button>
  </div>
</div>

<!-- ========== ADD/EDIT FORM ========== -->
<div id="pgForm" class="hidden">
  <div class="form-group"><label>Buy Date</label><input type="date" id="fBuyDate"></div>
  <div class="form-group"><label>Sell Date</label><input type="date" id="fSellDate"></div>
  <div class="form-group"><label>Qty</label><input type="number" id="fQty" inputmode="numeric"></div>
  <div class="form-group"><label>Buy Price</label><input type="number" step="0.01" id="fBuyPrice" inputmode="decimal"></div>
  <div class="form-group"><label>Sell Price</label><input type="number" step="0.01" id="fSellPrice" inputmode="decimal"></div>
  <div class="actions">
    <button onclick="submitForm()">Save</button>
    <button onclick="cancelForm()" style="border-color:#888;color:#888">Cancel</button>
  </div>
  <div id="formErr" class="err"></div>
</div>

<script>
// ========== CONFIG ==========
function getApiUrl() { return localStorage.getItem('nb_api_url') || ''; }
const INITIAL_AMOUNT = 200000;
const LOT_AMOUNT = 20000;
const SAME_DAY_SELL_PCT = 2.7;
const NEXT_DAY_SELL_PCT = 2.6;
const DROP_BUY_PCT = 1.9;
const NO_HANG_BUY_DROP_PCT = 1.3;
const MAX_LOTS = 10;

// ========== STATE ==========
let transactions = [];
let gainProfitRs = 0;
let editingId = null;

// ========== LOCAL STORAGE HELPERS ==========
function lsGet(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function lsSet(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function getPass() { return localStorage.getItem('nb_pass') || ''; }

// ========== API CALL ==========
async function apiCall(action, extra = {}) {
  const body = { action, password: getPass(), ...extra };
  const resp = await fetch(getApiUrl(), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'API error');
  if (data.error) throw new Error(data.error);
  return data;
}

// ========== LOGIN ==========
function doLogin() {
  const u = document.getElementById('inpUrl').value.trim();
  const p = document.getElementById('inpPass').value.trim();
  if (!p) return;
  if (u) localStorage.setItem('nb_api_url', u);
  localStorage.setItem('nb_pass', p);
  showMain();
}

// ========== PAGE NAVIGATION ==========
function showPage(id) {
  ['pgLogin','pgMain','pgForm'].forEach(p => document.getElementById(p).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

async function showMain() {
  showPage('pgMain');
  // Use cache if available
  const cachedTx = lsGet('nb_transactions');
  const cachedGain = lsGet('nb_gain');
  if (cachedTx !== null) {
    transactions = cachedTx;
    gainProfitRs = parseFloat(cachedGain || 0);
    document.getElementById('cacheStatus').textContent = 'cached';
    renderAll();
  } else {
    await hardRefresh();
  }
}

async function hardRefresh() {
  document.getElementById('cacheStatus').textContent = 'loading...';
  try {
    const [txData, gainData] = await Promise.all([
      apiCall('get_transactions'),
      apiCall('get_gain')
    ]);
    transactions = txData.rows || [];
    gainProfitRs = parseFloat(gainData.profit_rs || 0);
    lsSet('nb_transactions', transactions);
    lsSet('nb_gain', gainProfitRs);
    document.getElementById('cacheStatus').textContent = 'live';
    renderAll();
  } catch (e) {
    document.getElementById('cacheStatus').textContent = 'error';
    alert('Refresh failed: ' + e.message);
  }
}

// ========== RENDER ==========
function renderAll() {
  renderTable();
  computeTargets();
}

function renderTable() {
  const tbody = document.getElementById('tbodyTx');
  const today = new Date().toISOString().slice(0, 10);
  tbody.innerHTML = '';
  transactions.forEach((t, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td>${i + 1}</td>` +
      `<td>${fmtDate(t.buy_date)}</td>` +
      `<td>${fmtDate(t.sell_date)}</td>` +
      `<td>${t.qty || ''}</td>` +
      `<td>${t.buy_price || ''}</td>` +
      `<td>${t.sell_price || ''}</td>` +
      `<td><button class="btn-edit" onclick="editRow(${t.id})">&#9998;</button>` +
      `<button class="btn-del" onclick="deleteRow(${t.id})">&#10005;</button></td>`;
    tbody.appendChild(tr);

    // Sub-row with per-row buy/sell targets and quantities
    const bp = parseFloat(t.buy_price);
    if (!isNaN(bp)) {
      const pct = (t.buy_date === today) ? SAME_DAY_SELL_PCT : NEXT_DAY_SELL_PCT;
      const nst = (bp * (1 + pct / 100)).toFixed(2);
      const nbt = (bp * (1 - DROP_BUY_PCT / 100)).toFixed(2);
      const X = gainProfitRs / 5;
      const nbq = Math.floor((INITIAL_AMOUNT + X) / parseFloat(nbt));
      const nsq = parseInt(t.qty) || 0;
      const subTr = document.createElement('tr');
      subTr.innerHTML = `<td colspan="7" style="font-size:11px;color:#666;padding:2px 4px 4px 20px">` +
        `Next Buy Target: <span style="color:#0f0">${nbt}</span> &nbsp;|&nbsp; ` +
        `Next Sell Target: <span style="color:#f44">${nst}</span><br>` +
        `Next Buy Qty: <span style="color:#0f0">${nbq}</span> &nbsp;|&nbsp; ` +
        `Next Sell Qty: <span style="color:#f44">${nsq}</span></td>`;
      tbody.appendChild(subTr);
    }
  });
}

function fmtDate(d) {
  if (!d) return '—';
  // Show as DD/MM
  const parts = d.split('-');
  if (parts.length === 3) return parts[2] + '/' + parts[1];
  return d;
}

// ========== TRADING LOGIC: BT, BQ, ST, SQ ==========
function computeTargets() {
  // Hanging buys = transactions where sell_date is null/empty
  const hanging = transactions.filter(t => !t.sell_date);
  // All buys (for fallback when no hanging exists)
  const allBuys = transactions.filter(t => t.buy_date && t.buy_price);

  let BT = '—', BQ = '—', ST = '—', SQ = '—';

  const X = gainProfitRs / 5;

  if (hanging.length > 0) {
    // === BUY TARGET ===
    // Buy when price drops 1.9% from the last hanging buy's buy_price
    // Sort hanging by buy_date desc to get latest
    const sortedHanging = [...hanging].sort((a, b) => (b.buy_date || '').localeCompare(a.buy_date || '') || b.id - a.id);
    const lastHanging = sortedHanging[0];
    const lastHangPrice = parseFloat(lastHanging.buy_price);

    if (hanging.length < MAX_LOTS && !isNaN(lastHangPrice)) {
      const bt = lastHangPrice * (1 - DROP_BUY_PCT / 100);
      const amount = INITIAL_AMOUNT + X;
      const bq = Math.floor(amount / bt);
      BT = bt.toFixed(2);
      BQ = bq;
    } else if (hanging.length >= MAX_LOTS) {
      BT = 'MAX LOTS';
      BQ = '—';
    }

    // === SELL TARGET ===
    // For each hanging buy, determine sell target
    // Same day → 2.7%, next days → 2.6%
    const today = new Date().toISOString().slice(0, 10);
    let lowestST = Infinity;
    let sellQty = 0;

    sortedHanging.forEach(t => {
      const bp = parseFloat(t.buy_price);
      if (isNaN(bp)) return;
      const pct = (t.buy_date === today) ? SAME_DAY_SELL_PCT : NEXT_DAY_SELL_PCT;
      const st = bp * (1 + pct / 100);
      if (st < lowestST) {
        lowestST = st;
        sellQty = parseInt(t.qty) || 0;
      }
    });

    if (lowestST < Infinity) {
      ST = lowestST.toFixed(2);
      SQ = sellQty;
    }
  } else if (allBuys.length > 0) {
    // No hanging buys — buy when price drops 1.3% from last buy price
    const sortedAll = [...allBuys].sort((a, b) => (b.buy_date || '').localeCompare(a.buy_date || '') || b.id - a.id);
    const lastBuy = sortedAll[0];
    const lbp = parseFloat(lastBuy.buy_price);
    if (!isNaN(lbp)) {
      const bt = lbp * (1 - NO_HANG_BUY_DROP_PCT / 100);
      const amount = INITIAL_AMOUNT + X;
      const bq = Math.floor(amount / bt);
      BT = bt.toFixed(2);
      BQ = bq;
    }
    ST = '—';
    SQ = '—';
  } else {
    // No transactions at all — first buy
    BT = 'First buy at market';
    const amount = INITIAL_AMOUNT + X;
    BQ = '~' + Math.floor(amount / 200); // rough estimate
  }

  document.getElementById('vBT').textContent = BT;
  document.getElementById('vBQ').textContent = BQ;
  document.getElementById('vST').textContent = ST;
  document.getElementById('vSQ').textContent = SQ;
}

// ========== ADD / EDIT / DELETE ==========
function showAddForm() {
  editingId = null;
  document.getElementById('fBuyDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('fSellDate').value = '';
  document.getElementById('fQty').value = '';
  document.getElementById('fBuyPrice').value = '';
  document.getElementById('fSellPrice').value = '';
  document.getElementById('formErr').textContent = '';
  showPage('pgForm');
}

function editRow(id) {
  const t = transactions.find(r => r.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('fBuyDate').value = t.buy_date || '';
  document.getElementById('fSellDate').value = t.sell_date || '';
  document.getElementById('fQty').value = t.qty || '';
  document.getElementById('fBuyPrice').value = t.buy_price || '';
  document.getElementById('fSellPrice').value = t.sell_price || '';
  document.getElementById('formErr').textContent = '';
  showPage('pgForm');
}

async function submitForm() {
  const data = {
    buy_date: document.getElementById('fBuyDate').value || null,
    sell_date: document.getElementById('fSellDate').value || null,
    qty: document.getElementById('fQty').value || null,
    buy_price: document.getElementById('fBuyPrice').value || null,
    sell_price: document.getElementById('fSellPrice').value || null
  };

  try {
    if (editingId) {
      const res = await apiCall('update_transaction', { id: editingId, ...data });
      const idx = transactions.findIndex(r => r.id === editingId);
      if (idx >= 0) transactions[idx] = { ...transactions[idx], ...data };
      if (res.profit_rs != null) gainProfitRs = parseFloat(res.profit_rs);
    } else {
      const res = await apiCall('add_transaction', data);
      transactions.unshift({ id: res.id, ...data });
      if (res.profit_rs != null) gainProfitRs = parseFloat(res.profit_rs);
    }

    lsSet('nb_gain', gainProfitRs);
    lsSet('nb_transactions', transactions);
    showPage('pgMain');
    renderAll();
  } catch (e) {
    document.getElementById('formErr').textContent = e.message;
  }
}

async function deleteRow(id) {
  if (!confirm('Delete this transaction?')) return;
  try {
    const res = await apiCall('delete_transaction', { id });
    transactions = transactions.filter(r => r.id !== id);
    if (res.profit_rs != null) gainProfitRs = parseFloat(res.profit_rs);
    lsSet('nb_gain', gainProfitRs);
    lsSet('nb_transactions', transactions);
    renderAll();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

function cancelForm() {
  showPage('pgMain');
}

// ========== GAIN RECALCULATION ==========
async function recalcGain() {
  let total = 0;
  transactions.forEach(t => {
    if (t.sell_price && t.buy_price && t.qty) {
      total += (parseFloat(t.sell_price) - parseFloat(t.buy_price)) * parseInt(t.qty);
    }
  });
  gainProfitRs = total;
  lsSet('nb_gain', gainProfitRs);
  try {
    await apiCall('update_gain', { profit_rs: total });
  } catch (e) {
    // silent — gain update is best-effort
  }
}

// ========== INIT ==========
(function init() {
  if (getPass() && getApiUrl()) {
    showMain();
  } else {
    // Pre-fill saved URL if exists
    const saved = getApiUrl();
    if (saved) document.getElementById('inpUrl').value = saved;
    showPage('pgLogin');
  }
})();
</script>
</body>
</html>
